# ==============================================================================
# 🧠 THE LD2410C MASTER TUNING GUIDE & COMPONENT REFERENCE
# ==============================================================================
# [Documentation preserved as provided]
# ==============================================================================
# 🧠 THE LD2410C MASTER TUNING GUIDE & COMPONENT REFERENCE
# ==============================================================================

# ------------------------------------------------------------------------------
# 📐 SECTION 1: CORE SPATIAL SETTINGS
# ------------------------------------------------------------------------------
#
# Distance Resolution (0.2m or 0.75m)
# DEFINITION: Changes the physical length of the "Gates". 
#   - 0.75m (Default): Best for normal rooms. Max range is ~6 meters (8 gates).
#   - 0.20m: Best for extremely precise, close-up detection (like a desk
#     sensor where you only care about the 1.5 meters around the keyboard). 
# BEST PRACTICE: Leave at 0.75m for full-room occupancy. Only use 0.2m if
# you are putting this inside a tiny space like a closet or under a desk.
#
# Max Move Gate (0 - 8)
# DEFINITION: The furthest gate the sensor will look for MACRO movement (walking).
# TUNING: Multiply the gate number by your resolution (usually 0.75m). If your 
#   room ends at 3 meters, set this to Gate 4 (3m / 0.75m). 
# HOW TO KNOW IT WORKS: Walk just outside the room's doorway. The "Moving Target"
#   sensor should NOT trigger. If it does, lower this gate by 1.
#
# Max Still Gate (0 - 8)
# DEFINITION: The furthest gate the sensor looks for MICRO movement (breathing).
# TUNING: Same math as above. Often, you want this 1 gate shorter than your 
#   Move Gate to ensure someone shifting their weight in the next room over 
#   doesn't keep the lights on through a thin drywall wall.

# ------------------------------------------------------------------------------
# ⏱️ SECTION 2: TIMERS & COMMUNICATION
# ------------------------------------------------------------------------------
#
# Radar Timeout (Seconds)
# DEFINITION: The hardware-level cooldown. Once the sensor detects absolute zero
#   movement and zero breathing, it waits this long before reporting "Clear".
# BEST PRACTICE: Since we put a `delayed_off: 10s` buffer in your Home Assistant
#   Router, set this hardware timeout to 5 seconds. This creates a solid 15s 
#   total safety net.
#
# Radar Bluetooth Control (Switch)
# DEFINITION: Turns the physical BLE radio inside the sensor on or off.
# BEST PRACTICE: Turn ON when you want to use the HLKRadarTool phone app to tune
#   the sensor. Turn OFF during normal daily use to reduce wireless noise/heat.

# ------------------------------------------------------------------------------
# 📊 SECTION 3: DIAGNOSTIC SENSORS (READ-ONLY)
# ------------------------------------------------------------------------------
#
# Moving Distance & Still Distance (Sensors)
# DEFINITION: Tells you exactly how many centimeters away the target is. 
# HOW TO USE: Use this to map your room! Walk to the couch, sit down, and look
#   at the "Still Distance" value. If it says 225cm, you now know the couch is 
#   exactly at Gate 3 (225 / 75 = 3).
#
# Move Energy & Still Energy (Sensors)
# DEFINITION: The overall "loudness" of the movement currently happening.
#   A ceiling fan might create a Move Energy of "15". You jumping jacks might
#   create a Move Energy of "95".

# ------------------------------------------------------------------------------
# 💡 SECTION 4: THE LIGHT SENSOR
# ------------------------------------------------------------------------------
#
# Light Function (Off / Below / Above) & Light Threshold (0-255)
# DEFINITION: The LD2410C has a tiny photosensitive resistor on the board.
#   It can physically block the radar from turning "ON" if the room is already
#   bright enough. 
# BEST PRACTICE: Set Function to "OFF". Why? Because if you put this sensor inside
#   a 3D-printed case or a wall box, it lives in the dark forever. Let Home 
#   Assistant handle your lux/brightness rules; let the radar just handle presence.

# ------------------------------------------------------------------------------
# 🛠️ SECTION 5: ENGINEERING MODE & NOISE GATES (THE MEAT AND POTATOES)
# ------------------------------------------------------------------------------
#
# Radar Engineering Mode (Switch)
# DEFINITION: Flips the sensor into diagnostic mode, unleashing a flood of 
#   data for every single gate (G0 through G8) into Home Assistant.
# WARNING: ONLY turn this on when actively tuning. Turn it off immediately after,
#   or your Home Assistant database will explode with thousands of updates a minute.
#
# G0 through G8 Move & Still Thresholds (0 - 100%)
# DEFINITION: These are your noise filters. Think of them as a "Must be THIS
#   tall to ride" sign for energy. If the energy in Gate 3 is 40%, but the 
#   Threshold is set to 50%, the radar ignores it.
#
# THE ULTIMATE TUNING PROCESS ("TRAINING" THE SENSOR):
#   1. Turn ON Engineering Mode.
#   2. Leave the room and close the door (or stay perfectly still in the corner).
#   3. Turn on the ceiling fan, the AC, or whatever causes "ghost" triggers.
#   4. Look at the G0-G8 Energy sensors in Home Assistant (or the phone app).
#   5. Find the gate that is making noise. For example, if "G3 Move Energy" 
#      is bouncing between 20% and 30% because of the fan...
#   6. Set the "G3 Move Threshold" slider to 35% (just above the noise floor).
#   7. Repeat for Still Energy.
#   8. Walk around the room to ensure your human energy (usually 80-100%) still
#      easily beats the threshold. 
#   9. Turn OFF Engineering Mode. You just perfectly trained your room.

