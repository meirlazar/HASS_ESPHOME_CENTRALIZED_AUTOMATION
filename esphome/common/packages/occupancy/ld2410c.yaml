button:
  - platform: ld2410
    factory_reset:
      name: Factory reset
      entity_category: "diagnostic"
    restart:
      name: Restart
      entity_category: "diagnostic"
    query_params:
      name: Query params
      entity_category: "diagnostic"
      
  # ----------------------------------------------------------------------------
  # 🛠️ AUTO-TUNE BUTTON 1: THE NOISE GATES
  # ----------------------------------------------------------------------------
  - platform: template
    name: "2. Stop Empty Room Mode"
    id: lock_thresholds_btn
    entity_category: "config"
    icon: "mdi:lock-check"
    on_press:
      - lambda: |-
          auto lock_gate = [](number::Number* threshold, sensor::Sensor* peak) {
            if (peak->state == 0.0f) return;
            float val = peak->state + 5.0f;
            if (val > 100.0f) val = 100.0f;
            if (val < 0.0f) val = 0.0f; 
            threshold->make_call().set_value(val).perform();
          };

          lock_gate(id(g0_move_threshold), id(g0_move_peak));
          lock_gate(id(g0_still_threshold), id(g0_still_peak));
          lock_gate(id(g1_move_threshold), id(g1_move_peak));
          lock_gate(id(g1_still_threshold), id(g1_still_peak));
          lock_gate(id(g2_move_threshold), id(g2_move_peak));
          lock_gate(id(g2_still_threshold), id(g2_still_peak));
          lock_gate(id(g3_move_threshold), id(g3_move_peak));
          lock_gate(id(g3_still_threshold), id(g3_still_peak));
          lock_gate(id(g4_move_threshold), id(g4_move_peak));
          lock_gate(id(g4_still_threshold), id(g4_still_peak));
          lock_gate(id(g5_move_threshold), id(g5_move_peak));
          lock_gate(id(g5_still_threshold), id(g5_still_peak));
          lock_gate(id(g6_move_threshold), id(g6_move_peak));
          lock_gate(id(g6_still_threshold), id(g6_still_peak));
          lock_gate(id(g7_move_threshold), id(g7_move_peak));
          lock_gate(id(g7_still_threshold), id(g7_still_peak));
          lock_gate(id(g8_move_threshold), id(g8_move_peak));
          lock_gate(id(g8_still_threshold), id(g8_still_peak));
          
          ESP_LOGI("custom", "Radar thresholds automagically locked! (Skipped empty gates)");

  # ----------------------------------------------------------------------------
  # 🧱 AUTO-TUNE BUTTON 2: THE PHYSICAL BOUNDARIES
  # ----------------------------------------------------------------------------
  - platform: template
    name: "4. Stop Walls Mode"
    id: lock_room_boundaries
    icon: mdi:wall
    entity_category: "config"
    on_press:
      - if:
          condition:
            lambda: 'return id(highest_walked_gate) == 0;'
          then:
            - logger.log: 
                level: ERROR
                format: "BOUNDARY: No movement detected! Turn on Walk Mode and walk around first."
          else:
            - logger.log: "BOUNDARY: Saving Move Gate..."
            - number.set:
                id: max_move_gate
                value: !lambda |-
                  int final_gate = id(highest_walked_gate) + 1;
                  if (final_gate > 8) final_gate = 8;
                  return final_gate;
            
            - delay: 1s
            
            - logger.log: "BOUNDARY: Saving Still Gate..."
            - number.set:
                id: max_still_gate
                value: !lambda |-
                  int final_gate = id(highest_walked_gate) + 1;
                  if (final_gate > 8) final_gate = 8;
                  return final_gate;
            
            - delay: 1s
            - logger.log: "BOUNDARY: Success! Max Gates locked."
            - switch.turn_off: radar_set_borders_mode
      
text_sensor:
  - platform: ld2410
    version:
      name: Firmware version
    mac_address:
      name: MAC address
      

  - platform: template
    name: "Radar Detection Distance"
    id: imperial_detection_distance
    icon: "mdi:ruler"
    update_interval: 1s
    lambda: |-
      if (isnan(id(raw_detection_distance).state)) return {"Unknown"};
      float inches = id(raw_detection_distance).state * 0.393701; 
      if (inches < 12.0) {
        return {str_snprintf("%.1f in", 10, inches)};
      } else {
        int feet = (int)(inches / 12.0);
        float rem_inches = inches - (feet * 12.0);
        return {str_snprintf("%d ft %.1f in", 15, feet, rem_inches)};
      }

  - platform: template
    name: "Radar Moving Distance"
    id: imperial_moving_distance
    icon: "mdi:walk"
    update_interval: 1s
    lambda: |-
      if (isnan(id(raw_moving_distance).state)) return {"Unknown"};
      float inches = id(raw_moving_distance).state * 0.393701;
      if (inches < 12.0) {
        return {str_snprintf("%.1f in", 10, inches)};
      } else {
        int feet = (int)(inches / 12.0);
        float rem_inches = inches - (feet * 12.0);
        return {str_snprintf("%d ft %.1f in", 15, feet, rem_inches)};
      }

  - platform: template
