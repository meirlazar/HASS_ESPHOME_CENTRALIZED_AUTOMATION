# ==============================================================================
# THE BOOT INJECTION (Forces your defaults to the hardware on startup)
# ==============================================================================

# REMEMBER TO USE THE ESP32 RX2 TO CONNECT TO THE CHIPS TX PIN
# AND THE ESP32 TX2 TO THE CHIPS RX PIN 
# File: common/packages/occupancy/ld2410c.yaml

# REMEMBER TO USE THE ESP32 RX2 TO CONNECT TO THE CHIPS TX PIN
# AND THE ESP32 TX2 TO THE CHIPS RX PIN 
# File: common/packages/occupancy/ld2410c.yaml

# REMEMBER TO USE THE ESP32 RX2 TO CONNECT TO THE CHIPS TX PIN
# AND THE ESP32 TX2 TO THE CHIPS RX PIN 
uart:
  tx_pin: ${radar_tx}
  rx_pin: ${radar_rx}
  baud_rate: 256000

ld2410:

# ==============================================================================
# 🌐 GLOBALS (For Auto-Calibration Math)
# ==============================================================================
globals:
  - id: highest_walked_gate
    type: int
    restore_value: false
    initial_value: '0'

binary_sensor:
  - platform: ld2410
    has_target:
      name: "Radar Room Occupied"
      id: radar_room_occupied
      device_class: occupancy
      icon: "mdi:human-male-female-child"
      filters:
        - delayed_off: 120s # The magic dropout buffer
        
    has_moving_target:
      name: Radar Has Moving Target
      id: has_moving_target
      
    has_still_target:
      name: Radar Has Still Target
      id: has_still_target

switch:
  - platform: ld2410
    engineering_mode:
      name: "1. Start Empty Room Mode"
      id: radar_engineering_mode
      entity_category: "config"
      restore_mode: RESTORE_DEFAULT_OFF
      
    bluetooth:
      name: "0. Enable Bluetooth"
      id: radar_bluetooth_control
      entity_category: "config"
      restore_mode: RESTORE_DEFAULT_ON

  # ----------------------------------------------------------------------------
  # 🚶 BOUNDARY WALK CALIBRATOR (Tracks how far you walk in the room)
  # ----------------------------------------------------------------------------
  - platform: template
    name: "3. Start Walls Mode"
    id: radar_set_borders_mode
    optimistic: true
    entity_category: "config"
    icon: mdi:foot-print
    on_turn_on:
      - lambda: 'id(highest_walked_gate) = 0;'
      - logger.log: "BOUNDARY CALIBRATION: Started! Walk to the far edges of the room."

number:
  # Hardware-level timeouts and distance gates
  - platform: ld2410
  
    timeout:
      name: "Internal Radar Occupied Timeout"
      id: internal_radar_occupied_timeout
      internal: true

    # --------------------------------------------------------------------------
    # 🔒 HIDDEN HARDWARE GATES (These now power the human-readable sliders)
    # --------------------------------------------------------------------------
    max_move_distance_gate:
      name: "Radar Max Move Gate Raw"
      id: max_move_gate
      internal: true
      on_value:
        then:
          - lambda: |-
              float res_cm = 75.0;
              if (id(distance_resolution).has_state() && id(distance_resolution).current_option().find("0.2") != std::string::npos) {
                res_cm = 20.0;
              }
              float actual_feet = (x * res_cm) / 30.48;
              id(radar_move_limit_ft).publish_state(actual_feet);
      
    max_still_distance_gate:
      name: "Radar Max Still Gate Raw"
      id: max_still_gate
      internal: true
      on_value:
        then:
          - lambda: |-
              float res_cm = 75.0;
              if (id(distance_resolution).has_state() && id(distance_resolution).current_option().find("0.2") != std::string::npos) {
                res_cm = 20.0;
              }
              float actual_feet = (x * res_cm) / 30.48;
              id(radar_still_limit_ft).publish_state(actual_feet);
      
    light_threshold:
      name: Radar Light threshold
      id: radar_light_threshold
      internal: true
      
    # --------------------------------------------------------------------------
    # 🤫 HIDDEN ENERGY THRESHOLDS (G0 - G8)
    # --------------------------------------------------------------------------
    g0:
      move_threshold:
        name: G0 move threshold
        id: g0_move_threshold
        mode: box
      still_threshold:
        name: G0 still threshold
        id: g0_still_threshold
        mode: box
    g1:
      move_threshold:
        name: G1 move threshold
        id: g1_move_threshold
        mode: box
      still_threshold:
        name: G1 still threshold
        id: g1_still_threshold
        mode: box
    g2:
      move_threshold:
        name: G2 move threshold
        id: g2_move_threshold
        mode: box
      still_threshold:
        name: G2 still threshold
        id: g2_still_threshold
        mode: box
    g3:
      move_threshold:
        name: G3 move threshold
        id: g3_move_threshold
        mode: box
      still_threshold:
        name: G3 still threshold
        id: g3_still_threshold
        mode: box
    g4:
      move_threshold:
        name: G4 move threshold
        id: g4_move_threshold
        mode: box
      still_threshold:
        name: G4 still threshold
        id: g4_still_threshold
        mode: box
    g5:
      move_threshold:
        name: G5 move threshold
        id: g5_move_threshold
        mode: box
      still_threshold:
        name: G5 still threshold
        id: g5_still_threshold
        mode: box
    g6:
      move_threshold:
        name: G6 move threshold
        id: g6_move_threshold
        mode: box
      still_threshold:
        name: G6 still threshold
        id: g6_still_threshold
        mode: box
    g7:
      move_threshold:
        name: G7 move threshold
        id: g7_move_threshold
        mode: box
      still_threshold:
        name: G7 still threshold
        id: g7_still_threshold
        mode: box
    g8:
      move_threshold:
        name: G8 move threshold
        id: g8_move_threshold
        mode: box
      still_threshold:
        name: G8 still threshold
        id: g8_still_threshold
        mode: box
        
  - platform: template
    name: "Radar Occupied Timeout"
    id: radar_occupied_timeout
    min_value: 0
    max_value: 1200
    initial_value: 600
    restore_value: true
    step: 25
    optimistic: true
    entity_category: "config"
    set_action:
      - number.set:
          id: internal_radar_occupied_timeout
          value: !lambda 'return x;'

  # ----------------------------------------------------------------------------
  # 📏 HUMAN-READABLE BOUNDARY SLIDERS (IN FEET)
  # ----------------------------------------------------------------------------
  - platform: template
    name: "Radar Max Detect Move Limit"
    id: radar_move_limit_ft
    unit_of_measurement: "ft"
    min_value: 0.0
    max_value: 20.0
    initial_value: 16.0
    restore_value: true
    step: 0.5
    entity_category: "config"
    icon: "mdi:ruler"
    set_action:
      - lambda: |-
          float res_cm = 75.0;
          if (id(distance_resolution).current_option().find("0.2") != std::string::npos) { res_cm = 20.0; }
          int gate = (int)((x * 30.48) / res_cm);
          if (gate > 8) gate = 8;
          if (gate < 0) gate = 0;
          id(max_move_gate).make_call().set_value(gate).perform();

  - platform: template
    name: "Radar Max Detect Still Limit"
    id: radar_still_limit_ft
    unit_of_measurement: "ft"
    min_value: 0.0
    max_value: 20.0
    initial_value: 16.0
    restore_value: true
    step: 0.5
    entity_category: "config"
    icon: "mdi:ruler"
    set_action:
      - lambda: |-
          float res_cm = 75.0;
          if (id(distance_resolution).current_option().find("0.2") != std::string::npos) { res_cm = 20.0; }
          
          int gate = (int)((x * 30.48) / res_cm);
          if (gate > 8) gate = 8;
          if (gate < 0) gate = 0;
          
          id(max_still_gate).make_call().set_value(gate).perform();
            
sensor:
  - platform: ld2410
  
    light:
      name: Radar Light
      id: radar_light
      internal: true
      
    detection_distance:
      name: Radar Detection Distance Raw
      id: raw_detection_distance
      internal: true
      
    moving_distance:
      name: Radar Moving Distance Raw
      id: raw_moving_distance
      internal: true
      on_value:
        then:
          # This connects the moving distance to the Boundary Walk Mode
          - if:
              condition:
                switch.is_on: radar_set_borders_mode
              then:
                - lambda: |-
                    float gate_size_cm = 75.0;
                    if (id(distance_resolution).has_state() && id(distance_resolution).current_option().find("0.2") != std::string::npos) {
                      gate_size_cm = 20.0;
                    }
                    int current_gate = (int)(x / gate_size_cm);
                    if (current_gate > id(highest_walked_gate)) {
                      id(highest_walked_gate) = current_gate;
                      ESP_LOGI("BOUNDARY", "New furthest gate reached: Gate %d", current_gate);
                    }
      
    still_distance:
      name: Radar Still Distance Raw
      id: raw_still_distance
      internal: true
      
    moving_energy:
      name: Radar Move Energy
      id: radar_move_energy
      
    still_energy:
      name: Radar Still Energy
      id: radar_still_energy
      
    # --------------------------------------------------------------------------
    # 🤫 INTERNAL ENERGY SENSORS (For Math Only)
    # --------------------------------------------------------------------------
    g0:
      move_energy:
        name: G0 move energy
        id: g0_move_peak
        internal: true
        filters:
          - lambda: |-
              static float p = 0.0;
              if (!id(radar_engineering_mode).state) { p = 0.0; return 0.0; }
              if (isnan(x)) return p;
              if (x > p) p = x;
              return p;
