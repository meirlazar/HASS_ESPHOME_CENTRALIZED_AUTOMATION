select:
  - platform: template
    name: "Buzzer Pattern"
    id: buzzer_pattern_select
    options:
      - "None"
      - "Fast"
      - "Slow"
      - "SOS"
      - "Chirp"
      - "Pulsing"
      - "Wail"
      - "Beep-Beep"
      - "Burst"
      - "Sweep"
    initial_option: "None"
    optimistic: true
    restore_value: false
    on_value:
      then:
        - lambda: |-
            ESP_LOGI("buzzer", "Pattern selected: %s", x.c_str());
            if (x == "None") return;
            if (x == "Fast") {
              id(buzzer_script).execute(100, 50, 15);
            } else if (x == "Slow") {
              id(buzzer_script).execute(1000, 300, 4);
            } else if (x == "Chirp") {
              id(buzzer_script).execute(50, 50, 1);
            } else if (x == "Pulsing") {
              id(buzzer_script).execute(150, 150, 20);
            } else if (x == "Burst") {
              id(buzzer_script).execute(20, 30, 30);
            } else if (x == "Beep-Beep") {
              id(buzzer_script).execute(50, 50, 2);
              delay(1000);
              id(buzzer_script).execute(50, 50, 2);
              delay(1000);
              id(buzzer_script).execute(50, 50, 2);
              delay(1000);
              id(buzzer_script).execute(50, 50, 2);
            } else if (x == "Sweep") {
                int i = 2000;
                int j = i / 2;
                id(buzzer_script).execute(i, j, 2);
                delay(j);
                j =  j / 2;
                id(buzzer_script).execute(j, j, 2);
                delay(j);
                j =  j / 2;
                id(buzzer_script).execute(j, j, 2);
                delay(j);
                j =  j / 2;
                id(buzzer_script).execute(j, j, 2);
            } else if (x == "Wail") {
                id(buzzer_script).execute(100, 50, 1);
                delay(400);
                id(buzzer_script).execute(200, 50, 1);
                delay(600);
                id(buzzer_script).execute(300, 50, 1);
            } else if (x == "SOS") {
                id(buzzer_script).execute(200, 50, 3);  // S
                delay(500);
                id(buzzer_script).execute(50, 50, 3);  // O
                delay(500);
                id(buzzer_script).execute(200, 50, 3);  // S
            }
  
            // Reset to "None" after playing
            id(buzzer_pattern_select).publish_state("None");
       
            
              
