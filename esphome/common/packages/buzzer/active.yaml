switch:
  - platform: gpio
    pin: ${active}
    id: "active_buzzer"
    name: "active_buzzer"
    internal: true

script:
  - id: buzzer_script
    parameters:
      on_time_ms: int
      off_time_ms: int
      reps: int
    mode: restart  # cancel prior if new pattern selected
    then:
      - repeat:
          count: !lambda 'return reps;'
          then:
            - switch.turn_on: active_buzzer
            - delay: !lambda 'return on_time_ms;'
            - switch.turn_off: active_buzzer
            - delay: !lambda 'return off_time_ms;'
            
    
    # this can be used with the following example code 
