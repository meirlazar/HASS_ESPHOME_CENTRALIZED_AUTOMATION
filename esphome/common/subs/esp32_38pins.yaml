# ESP32-WROOM-DEV32D PINOUT
# ESP-WROOM-32 38 PIN CP2102 USB-C ARDUINO - HAS NO PINS SHOWN O N FRONT

# DAC = DIGITAL TO ANALOG CONVERTER - USE FOR GENERATING ANALOG OUTPUT SIGNALS LIKE AUDIO OUTPUTS
# ADC = Analog to Digital Converter - USE FOR ANALOG SIGNAL INPUTS
# TOUCH = Built-in capacitive touch sensor pin, wessentially acting as a virtual button by sensing changes in capacitance when touched; it's a built-in feature that utilizes specific GPIO pins dedicated to touch sensing
# FLASH = PINS to read and write code and data; it's crucial not to use these pins for other purposes
# I2C =  PINS used to send/receive data between the ESP32 and other devices like sensors, displays, or other microcontrollers using the I2C protocol
# CLK = PIN refers to a "Clock" pin, which is a dedicated GPIO pin used to send a clock signal to another device, essentially acting as the timing reference for data transmission in communication protocols 
# CMD = PIN designated as the "Command" pin when interfacing with a specific peripheral, most commonly in SPI communication
# VSPI = PINS used to send/receive data using the SPI protocol to external devices like sensors or displays.
# MISO = PIN stands for "Master In Slave Out," used in the Serial Peripheral Interface (SPI) communication protocol, slave sends data to the master on the MISO pin. 
# TX = PIN for Transmission, meaning it is used to send data out
# RX = PIN for Receiving data from a sensor or device
# SS = PIN "Slave Select", for selecting a specific device on a SPI (Serial Peripheral Interface) bus when communicating with multiple peripherals simultaneously; acting as a chip select signal to identify which device on the bus should be addressed during data transfer

