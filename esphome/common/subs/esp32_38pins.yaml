PIN33: GPIO21 # I2C SDA  -- P21
PIN32: 'GND' 
PIN31: GPIO19 # VSPI MISO -- P19
PIN30: GPIO18 # VSPI SCK  -- P18
PIN29: GPIO5 # VSPI SS    -- P5
PIN28: GPIO17 # TX2       -- P17
PIN27: GPIO16 # RX2       -- P16
PIN26: GPIO4 # ADC TOUCH0 -- P4
PIN25: GPIO0 # ADC TOUCH1 -- P0 # DO NOT USE
PIN24: GPIO2 # ADC TOUCH2 -- P2 # DO NOT USE
PIN23: GPIO15 # ADC13 TOUCH3 -- P15 # DO NOT USE
PIN22: GPIO8 # FLASH D1 -- SD1
PIN21: GPIO7 # FLASH D0 -- SD0
PIN20: GPIO6 # FLASH CK -- CLK

