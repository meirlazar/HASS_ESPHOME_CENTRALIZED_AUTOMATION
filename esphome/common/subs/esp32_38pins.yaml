PIN5: GPIO34 # ADC6          -- P34
PIN6: GPIO35 # ADC7          -- P35
PIN7: GPIO32 # ADC4 TOUCH9     -- P32
PIN8: GPIO33 # ADC5 TOUCH 8     -- P33
PIN9: GPIO25 # ADC18 DAC1      -- P25 
PIN10: GPIO26 # ADC19 DAC2    -- P26
PIN11: GPIO27 # ADC17 TOUCH7 -- P27
PIN12: GPIO14 # ADC16 TOUCH6 -- P14
PIN13: GPIO12 # ADC15 TOUCH5 -- P12 # DO NOT USE
PIN14: 'GND' # 
PIN15: GPIO13 # ADC14 TOUCH4 -- P13
PIN16: GPIO9 # RX1 FLASH D2 -- SD2  # DO NOT USE
PIN17: GPIO10 # TX1 FLASH D3 -- SD3 # DO NOT USE
PIN18: GPIO11 # FLASH CMD P11 -- CMD
PIN19: '5V' 


## RIGHT SIDE - DESCENDING


PIN38: 'GND'
PIN37: GPIO23 # VSPI MOSI -- P23
PIN36: GPIO22 # I2C SCL   -- P22 
PIN35: GPIO1 # TX0        -- TX TRIGGER
