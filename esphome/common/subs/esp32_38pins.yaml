# BY BREAKOUT BOARD NAMING CONVENTION

# P0: GPIO0 # ADC TOUCH1 - DO NOT USE -  Must be HIGH to boot, LOW for flashing. Best for: Button, pull-up sensor.
# P0: GPIO0 # ADC TOUCH1 - DO NOT USE - USE WITH Pushbuttons, motion sensors (PIR), reed switches
# P1: GPIO1 # TX0 -- FOR ULTRASONIC SENSOR TRIGGER
# P2: GPIO2 # ADC TOUCH2 - DO NOT USE - Connected to onboard LED. - USE WITH light sensors, Pushbuttons, motion sensors (PIR), reed switches
# P3: GPIO3 # RX0 -- FOR ULTRASONIC SENSOR ECHO
# P4: GPIO4 # ADC TOUCH0
# P5: GPIO5 # VSPI SS - Avoid if possible, or use for output
# P6: GPIO6 # FLASH CK
# P7: GPIO7 # FLASH D0
# P8: GPIO8 # FLASH D1
# P9: GPIO9 # RX1 FLASH D2
# P10: GPIO10 # TX1 FLASH D3
# P11: GPIO11 # FLASH CMD
# P12: GPIO12 # ADC15 TOUCH5  - DO NOT USE - Must NOT be high at boot or it fails
# P13: GPIO13 # ADC14 TOUCH4
# P14: GPIO14 # ADC16 TOUCH6
# P15: GPIO15 # ADC13 TOUCH3 - DO NOT USE - USE WITH Pushbuttons, light sensors, motion sensors (PIR), reed switches
# P16: GPIO16 # RX2
# P17: GPIO17 # TX2
# P18: GPIO18 # VSPI SCK
# P19: GPIO19 # VSPI MISO
# P21: GPIO21 # I2C SDA -- FOR TEMP SENSOR
# P22: GPIO22 # I2C SCL --- FOR TEMP SENSOR
# P23: GPIO23 # VSPI MOSI
# P25: GPIO25 # ADC18 DAC1
# P26: GPIO26 # ADC19 DAC2 # do not use
# P27: GPIO27 # ADC17 TOUCH7
# P32: GPIO32 # ADC4 TOUCH9
# P33: GPIO33 # ADC5 TOUCH 8 - NO OUTPUT SENSORS
# P34: GPIO34 # ADC6 - NO OUTPUT SENSORS
# P35: GPIO35 # ADC7 - NO OUTPUT SENSORS 
# P36: GPIO36 # ADC0 - NO OUTPUT SENSORS
# P39: GPIO39 # ADC3 - NO OUTPUT SENSORS

# SHORTCUTS


RX0: GPIO3 #   RPIN34  G3   P3  D3  PIN34  
TX0: GPIO1 #   RPIN35  G1   P1  D1  PIN35
RX1: GPIO9 #   LPIN16  G9   P9  D9  PIN16
TX1: GPIO10 #  LPIN17  G10  P10 D10 PIN17
RX2: GPIO16 #  RPIN27  G16  P16 D16 PIN27
TX2: GPIO17 #  RPIN28  G17  P17 D17 PIN28
SDA: GPIO21 #  RPIN33  G21  P21 D21 PIN33
SCL: GPIO22 #  RPIN36  G22  P22 D22 PIN36


SD2: GPIO9 # RX1 - DO NOT USE
SD3: GPIO10 # TX1 - DO NOT USE

