- id: '1772084211168'
  alias: Master Area Control Router
  description: Edge-Triggered Rule Engine Router (Pure State)
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.porch_arduino_radar_room_occupied
    - binary_sensor.kid1_arduino_room_occupied
    - binary_sensor.kid2_arduino_room_occupied
    - binary_sensor.parents_arduino_radar_room_occupied
    - binary_sensor.gym_arduino_radar_room_occupied
    - binary_sensor.kid3_arduino_radar_room_occupied
    - binary_sensor.kid4_arduino_radar_room_occupied
    - binary_sensor.computer_arduino_radar_room_occupied
    - binary_sensor.pantry_arduino_room_occupied
    - binary_sensor.laundry_arduino_radar_room_occupied
    - binary_sensor.office_arduino_radar_room_occupied
    - binary_sensor.living_arduino_radar_room_occupied
    - binary_sensor.dining_arduino_room_occupied
    - binary_sensor.overhang_arduino_radar_room_occupied
    not_from:
    - unknown
    - unavailable
    not_to:
    - unknown
    - unavailable
  - trigger: state
    entity_id:
    - binary_sensor.office_door_sensor
    - binary_sensor.office_arduino_exterior_door_sensor
    - binary_sensor.office_arduino_fence_door_sensor
    - binary_sensor.porch_arduino_external_door_sensor
    - binary_sensor.gym_arduino_internal_door_sensor
    - binary_sensor.gym_arduino_exterior_door_sensor
    - binary_sensor.living_arduino_exterior_door_sensor
    - binary_sensor.kid1_arduino_internal_door_sensor
    - binary_sensor.parents_arduino_left_door_sensor
    - binary_sensor.parents_arduino_right_door_sensor
    - binary_sensor.computer_arduino_internal_door_sensor
    not_from:
    - unknown
    - unavailable
    to:
    - 'on'
  actions:
  - variables:
      target_area: '{{ area_id(trigger.entity_id) | default(''unknown'') }}'
      new_state: '{{ trigger.to_state.state }}'
      old_state: '{{ trigger.from_state.state }}'
      friendly_name: '{{ state_attr(trigger.entity_id, ''friendly_name'') | default(trigger.entity_id)
        }}'
      v_json: '{%- from ''auto.jinja'' import set_all_vars -%}  {{- set_all_vars(trigger.entity_id,
        area_override=target_area) -}}'
      v: '{{ v_json | from_json }}'
  - action: logbook.log
    data:
      name: "\U0001F9ED ROUTER: {{ target_area | upper }}"
      message: "\U0001F6A8 Intercepted: {{ friendly_name }} \U0001F504 State Change:
        {{ old_state | upper }} ➔ {{ new_state | upper }}  \U0001F4E6 Payload: auto.jinja
        loaded successfully"
  - if:
    - condition: template
      value_template: '{{ v.is_frozen or (v.is_shabbos and not v.cointoss) }}'
    then:
    - action: logbook.log
      data:
        name: '⛔ ROUTER BLOCKED: {{ target_area | upper }}'
        message: "\U0001F9CA Frozen Status: {{ v.is_frozen }}  \U0001F319 Shabbos
          Status: {{ v.is_shabbos }}  (Coin: {{ v.cointoss | title }})  \U0001F6D1
          Action: Signal terminated at the Router."
    - stop: "\U0001F9CA Frozen OR \U0001F319 Shabbos (Tails) - Router Blocked"
  - action: logbook.log
    data:
      name: "\U0001F680 ROUTER: HANDOFF"
      message: ✅ Checks passed.  ➡️ Sending {{ target_area | upper }} ({{ new_state
        | upper }}) to Master Room Engine.
  - action: script.master_room_engine
    data:
      trig: '{{ trigger.entity_id }}'
      force_action: '{{ new_state }}'
      v: '{{ v }}'
  mode: parallel
  max: 50
- id: '1773218392524'
  alias: '⚙️ System: Global Environment Sync'
  description: Re-evaluates all occupied rooms when periods, sun, or Shabbos status
    changes.
  triggers:
  - trigger: homeassistant
    event: start
    id: System Boot
  - trigger: sun
    event: sunset
    offset: -00:30:00
    id: Sunset Approaching
  - trigger: sun
    event: sunrise
    id: Sunrise
  - trigger: state
    entity_id: binary_sensor.jewish_calendar_issur_melacha_in_effect
    not_from:
    - unknown
    - unavailable
    id: Shabbos Transition
  - trigger: time
    at: 05:00:00
    id: Early Morning Start
  - trigger: time
    at: 09:00:00
    id: Worktime Start
  - trigger: time
    at: '10:00:00'
    id: Sleeptime End
  - trigger: time
    at: '18:00:00'
    id: Worktime End
  - trigger: time
    at: '20:00:00'
    id: Late Evening Start
  - trigger: time
    at: '23:00:00'
    id: Sleeptime Start
  actions:
  - action: logbook.log
    data:
      name: "\U0001F504 GLOBAL SYNC INITIATED"
      message: 'Triggered by: {{ trigger.id }}. Re-evaluating all occupied rooms.'
  - action: script.sync_all_rooms_apply_rules
    data: {}
  mode: queued
